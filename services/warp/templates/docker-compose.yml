services:
  warp:
    image: cmj2002/warp-docker:latest
    container_name: warp
    restart: unless-stopped
    ports:
      - "127.0.0.1:40000:1080"
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
